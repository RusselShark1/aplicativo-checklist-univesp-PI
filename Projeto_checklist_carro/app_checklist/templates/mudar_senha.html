<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - Checklist</title>
    <style>
        /* Estilo Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Card do Formulário */
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }

        h2 {
            color: #1a73e8;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Estilização dos campos do Django */
        p {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        input[type="password"], 
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Fundamental para não vazar a largura */
            font-size: 16px;
        }

        input:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 5px rgba(26, 115, 232, 0.3);
        }

        /* Textos de ajuda do Django */
        .helptext {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            line-height: 1.4;
        }

        ul.helptext {
            padding-left: 20px;
        }

        /* Mensagem de Sucesso */
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        /* Botão e Links */
        .btn-submit {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1557b0;
        }

        .links-container {
            text-align: center;
            margin-top: 20px;
        }

        .link-cancelar {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .link-cancelar:hover {
            text-decoration: underline;
            color: #d93025;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Alterar sua Senha</h2>

        {% if sucesso %}
            <div class="alert-success">
                ✅ Senha alterada com sucesso!
            </div>
            <div class="links-container">
                <a href="{% url 'cadastrar' %}" class="btn-submit" style="display: block; text-decoration: none;">Voltar para o Checklist</a>
            </div>
        {% else %}

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn-submit">Salvar Nova Senha</button>
            </form>

            <div class="links-container">
                <a href="{% url 'cadastrar' %}" class="link-cancelar">Desistir e voltar</a>
            </div>

        {% endif %}
    </div>

</body>
</html>
