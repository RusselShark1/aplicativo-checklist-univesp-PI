
{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Checklist de Veiculos</title>
  </head>

  <style>
  /* Efeito de foco para o grupo inteiro */
  .input-group:focus-within {
    border-radius: 0.25rem;
    box-shadow: 0 0 0 0.25rem rgba(44, 62, 80, 0.25); /* Brilho baseado no seu azul */
    border: 1px solid #2c3e50 !important; 
  }

  /* Remove bordas internas para parecer uma peça única */
  .input-group:focus-within .form-control, 
  .input-group:focus-within .form-select,
  .input-group:focus-within .input-group-text {
    border-color: transparent !important;
    box-shadow: none;
  }
  
  /* Mantém o padrão visual das etiquetas azuis */
  .custom-label {
    background-color: #2c3e50;
    color: white;
    border: none;
  }
</style>


  <body>
 <nav class="navbar navbar-dark" style="background-color: #2c3e50;">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      {% load static %}
      <img src="{% static 'image_65e9fb.png' %}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
      Checklist Veicular
    </a>
  </div>
</nav>

<form action="{% url 'nome_da_sua_view' %}" method="POST">
  {% csrf_token %}

  <div class="d-flex justify-content-start align-items-center flex-wrap gap-3">
    
    <!-- RE -->
    <div class="input-group w-auto border rounded">
      <span class="input-group-text custom-label">RE:</span>
      <input type="text" name="re_colaborador" class="form-control border-0" placeholder="59-XXXXX" style="width: 130px;">
    </div>

    <!-- Nome -->
    <div class="input-group w-auto border rounded">
      <span class="input-group-text custom-label">Nome:</span>
      <input type="text" name="nome_colaborador" class="form-control border-0" placeholder="Digite aqui" style="width: 150px;">
    </div>

    <!-- Modelo -->
    <div class="input-group w-auto border rounded">
      <span class="input-group-text custom-label">Modelo:</span>
      <select name="modelo_veiculo" class="form-select border-0" style="width: 180px;">
        <option selected disabled>Selecione...</option>
        <option value="fiorino">Fiat Fiorino</option>
        <option value="master">Renault Master</option>
      </select>
    </div>

    <!-- Placa (Agora com NAME para o Django coletar) -->
    <div class="input-group w-auto border rounded">
      <span class="input-group-text custom-label">Placa:</span>
      <input type="text" name="placa_veiculo" class="form-control border-0" placeholder="ABC-1234" style="width: 120px;">
    </div>

    <button type="submit" class="btn btn-success">Salvar Checklist</button>
  </div>
</form>


</div>
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
