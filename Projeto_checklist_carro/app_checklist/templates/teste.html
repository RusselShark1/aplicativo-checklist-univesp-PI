<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a202c; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background-color: #2563eb; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .secao { border-top: 1px solid #eee; margin: 20px 0; padding-top: 10px; color: #718096; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Checklist Frota</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Motorista</label>
                <input type="text" name="usuario" required>
            </div>

            <div class="form-group">
                <label>Matrícula</label>
                <input type="number" name="matricula" required>
            </div>

            <div class="form-group">
                <label>Modelo do Veículo</label>
                <input type="text" name="modelo" placeholder="Ex: Gol Branco" required>
            </div>

            <div class="form-group">
                <label>Placa</label>
                <input type="text" name="placa" placeholder="ABC1D23" required>
            </div>

            <div class="secao">Níveis e Fluidos</div>

            <div class="form-group">
                <label>Nível de Água</label>
                <select name="agua" required>
                    <option value="OK">OK</option>
                    <option value="Não OK">Não OK</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nível de Óleo</label>
                <select name="oleo" required>
                    <option value="OK">OK</option>
                    <option value="Não OK">Não OK</option>
                </select>
            </div>

            <div class="form-group">
                <label>Combustível</label>
                <select name="combustivel" required>
                    <option value="1/4">1/4 (Reserva/Baixo)</option>
                    <option value="1/2">1/2 (Meio Tanque)</option>
                    <option value="3/4">3/4 (Quase Cheio)</option>
                    <option value="Cheio">Cheio</option>
                </select>
            </div>

            <div class="form-group">
                <label>KM Atual</label>
                <input type="number" name="km" required>
            </div>

            <button type="submit">Enviar Checklist</button>
        </form>
    </div>

</body>
</html>
