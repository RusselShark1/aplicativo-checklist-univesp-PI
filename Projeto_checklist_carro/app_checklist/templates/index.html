{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checklist MobSafe</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. Estilo Geral e Arredondamento dos Grupos */
        .input-group {
            border-radius: 10px !important; 
            overflow: hidden;    
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        /* 2. Efeito de foco azul no grupo completo */
        .input-group:focus-within {
            border-color: #2c3e50 !important;
            box-shadow: 0 0 0 0.25rem rgba(44, 62, 80, 0.25) !important;
        }

        /* 3. Ajuste das etiquetas (RE, Nome, etc) */
        .custom-label {
            background-color: #2c3e50 !important;
            color: white !important;
            border: none !important;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        /* 4. Limpeza das bordas internas */
        .input-group .form-control, 
        .input-group .form-select {
            border: none !important;
            box-shadow: none !important;
        }

        /* 5. BOTÃO PERSONALIZADO AZUL (Substitui o btn-success) */
        .btn-custom-azul {
            background-color: #2c3e50 !important;
            color: white !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 10px 20px !important;
            transition: background-color 0.3s ease !important;
            font-weight: 500 !important;
        }

        .btn-custom-azul:hover {
            background-color: #1a252f !important;
            color: white !important;
        }

        /* Espaçamento entre colunas no mobile */
        @media (max-width: 768px) {
            .col-md-2, .col-md-3 { margin-bottom: 15px; }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark mb-4" style="background-color: #2c3e50;">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <!-- Se a imagem não aparecer, verifique se está na pasta app_checklist/static/ -->
      <img src="{% static 'carrovermelho.png' %}" alt="Logo" width="40" height="auto" class="me-2">
      Checklist Veicular
    </a>
  </div>
</nav>

<div class="container">
    <form action="{% url 'home' %}" method="POST" class="p-4 border rounded shadow-sm bg-light">
        {% csrf_token %}

        <div class="row g-3 align-items-center">
            
            <!-- RE -->
            <div class="col-md-2">
                <div class="input-group">
                    <span class="input-group-text custom-label">RE:</span>
                    <input type="text" name="re_colaborador" class="form-control" placeholder="59-XXXXX">
                </div>
            </div>

            <!-- Nome -->
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text custom-label">Nome:</span>
                    <input type="text" name="nome_colaborador" class="form-control" placeholder="Digite aqui">
                </div>
            </div>

            <!-- Modelo -->
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text custom-label">Modelo:</span>
                    <select name="modelo_veiculo" class="form-select">
                        <option selected>Selecione...</option>
                        <option value="sedan">Sedan</option>
                        <option value="pickup">Pickup</option>
                    </select>
                </div>
            </div>

            <!-- Placa -->
            <div class="col-md-2">
                <div class="input-group">
                    <span class="input-group-text custom-label">Placa:</span>
                    <input type="text" name="placa_veiculo" class="form-control" placeholder="ABC-1234">
                </div>
            </div>

            <!-- Botão Corrigido -->
            <div class="col-md-2">
                <button type="submit" class="btn btn-custom-azul w-100">Salvar Checklist</button>
            </div>

        </div>
    </form>
</div>

</body>
</html>
